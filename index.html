<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carril Motor - Buscador de Productos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.header img { height: 40px; }
.header h1 { font-size: 1.1rem; font-weight: 600; }
.header .subtitle { font-size: .7rem; opacity: .7; }

/* Tabs */
.tab-bar { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 60px; z-index: 99; }
.tab-btn { flex: 1; padding: 12px 8px; text-align: center; font-weight: 700; font-size: .95rem; border: none; background: #f5f5f5; cursor: pointer; border-bottom: 3px solid transparent; transition: .2s; position: relative; }
.tab-btn:hover { background: #e8e8e8; }
.tab-btn.active { background: white; border-bottom-color: #1a73e8; color: #1a73e8; }
.tab-badge { background: #e53935; color: white; font-size: .65rem; padding: 1px 6px; border-radius: 10px; margin-left: 6px; font-weight: 700; }

.tab-content { display: none; }
.tab-content.active { display: flex; flex-direction: column; height: calc(100vh - 110px); }

/* Productos tab */
.filters { padding: 10px 12px; background: white; border-bottom: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.filters input[type=text], .filters select { padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: .9rem; }
.filters input#search { flex: 1; min-width: 150px; }
.filters select { flex: 1; min-width: 120px; max-width: none; }
.filters .filter-row { display: flex; gap: 6px; width: 100%; }
.sort-area { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: .78rem; }
.sort-area label { font-weight: 600; }
.sort-btn { padding: 4px 8px; border: 1px solid #bbb; border-radius: 4px; background: white; cursor: pointer; font-size: .75rem; }
.sort-btn:hover { background: #e8e8e8; }
.sort-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
.sort-btn.active.desc::after { content: ' ▼'; }
.sort-btn.active.asc::after { content: ' ▲'; }
.clear-sort { color: #e53935; cursor: pointer; text-decoration: underline; font-size: .75rem; }
.btn-limpiar { padding: 8px 12px; border: 1px solid #e53935; border-radius: 6px; background: #fff; color: #e53935; font-weight: 600; cursor: pointer; font-size: .8rem; white-space: nowrap; }
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: .8rem; }
thead { position: sticky; top: 0; z-index: 10; }
th { background: #1a1a2e; color: white; padding: 7px 5px; text-align: left; white-space: nowrap; font-weight: 600; font-size: .75rem; }
td { padding: 5px; border-bottom: 1px solid #eee; }
tr:hover { background: #e3f2fd; }
tr.out-of-stock { color: #999; }
.stock-0 { color: #e53935; font-weight: 700; }
.stock-pos { color: #2e7d32; font-weight: 700; }
.add-btn { padding: 4px 8px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: .75rem; white-space: nowrap; }
.add-btn:hover { background: #1557b0; }
input.qty-input { width: 45px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: .85rem; }
.info-bar { padding: 5px 12px; background: #fff3e0; border-bottom: 1px solid #eee; font-size: .78rem; color: #555; }
.pagination { padding: 6px 12px; background: white; border-top: 1px solid #ddd; display: flex; gap: 4px; align-items: center; justify-content: center; font-size: .8rem; flex-wrap: wrap; }
.pagination button { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; font-size: .8rem; }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination button.active-page { background: #1a73e8; color: white; border-color: #1a73e8; }
#loading { display: flex; align-items: center; justify-content: center; height: 200px; font-size: 1.1rem; color: #888; }

/* Medidas flotante */
.medidas-bar { padding: 8px 12px; background: #e8f0fe; border-bottom: 2px solid #1a73e8; display: none; flex-wrap: wrap; gap: 6px; align-items: center; }
.medidas-bar.visible { display: flex; }
.medidas-bar label { font-weight: 700; font-size: .78rem; color: #1a1a2e; white-space: nowrap; }
.medidas-bar input { padding: 5px 8px; border: 1px solid #90caf9; border-radius: 4px; font-size: .85rem; width: 70px; text-align: center; }
.medidas-bar .medida-group { display: flex; align-items: center; gap: 3px; }
.medidas-bar .medida-group span { font-size: .75rem; color: #666; }
.medidas-bar .medida-title { font-weight: 700; font-size: .82rem; color: #1a73e8; width: 100%; margin-bottom: 2px; }

/* Google img btn */
.img-btn { padding: 3px 6px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: .7rem; white-space: nowrap; }
.img-btn:hover { background: #e68900; }

/* Carrito tab */
.presup-header { padding: 12px; background: #1a1a2e; color: white; }
.presup-header h2 { font-size: 1rem; margin-bottom: 8px; }
.presup-header input { width: 100%; padding: 8px 10px; border-radius: 6px; border: none; font-size: .95rem; }
.lista-selector { display: flex; gap: 0; border-bottom: 2px solid #ddd; }
.lista-btn { flex: 1; padding: 10px 6px; text-align: center; cursor: pointer; font-weight: 600; font-size: .85rem; background: #f5f5f5; border: none; border-bottom: 3px solid transparent; transition: .2s; }
.lista-btn:hover { background: #e0e0e0; }
.lista-btn.active { background: white; border-bottom-color: #1a73e8; color: #1a73e8; }
.lista-btn .desc-pct { font-size: .65rem; font-weight: 400; display: block; color: #888; }
.presup-items.lista-PLI { background: rgba(76,175,80,0.08); }
.presup-items.lista-TM { background: rgba(3,169,244,0.10); }
.presup-items.lista-TE { background: rgba(244,67,54,0.08); }
.presup-items { flex: 1; overflow-y: auto; padding: 8px; }
.presup-item { background: #fafafa; border-radius: 8px; margin-bottom: 6px; padding: 8px 10px; font-size: .82rem; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.presup-item .pi-top { display: flex; width: 100%; align-items: center; gap: 6px; }
.presup-item .pi-cod { font-weight: 700; font-size: .78rem; color: #1a1a2e; }
.presup-item .pi-remove { cursor: pointer; color: #e53935; font-weight: 700; font-size: 1.1rem; margin-left: auto; padding: 0 4px; }
.presup-item .pi-desc { width: 100%; font-size: .78rem; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.presup-item .pi-bottom { display: flex; width: 100%; justify-content: space-between; align-items: center; font-size: .8rem; margin-top: 2px; }
.presup-item .pi-qty-price { color: #666; }
.presup-item .pi-subtotal { font-weight: 700; color: #1a1a2e; font-size: .9rem; }
.presup-footer { padding: 12px; background: #f5f5f5; border-top: 2px solid #ddd; }
.presup-total { font-size: 1.4rem; font-weight: 700; text-align: right; color: #1a1a2e; }
.presup-count { font-size: .8rem; color: #666; }
.presup-actions { display: flex; gap: 8px; margin-top: 8px; }
.presup-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: .9rem; }
.btn-print { background: #1a73e8; color: white; }
.btn-clear { background: #e53935; color: white; }

/* Desktop: side by side */
@media (min-width: 900px) {
  .tab-bar { display: none; }
  .main-wrap { display: flex; height: calc(100vh - 60px); }
  .tab-content { display: flex !important; flex-direction: column; }
  #tabProductos { flex: 1; min-width: 0; }
  #tabCarrito { width: 420px; border-left: 2px solid #ddd; background: white; }
  .tab-content.active { height: auto; }
  .tab-content { height: auto; }
  #tabProductos { height: calc(100vh - 60px); }
  #tabCarrito { height: calc(100vh - 60px); }
}

@media print {
  .tab-bar, #tabProductos, .header { display: none !important; }
  #tabCarrito { display: flex !important; flex-direction: column; width: 100%; border: none; height: auto !important; }
  .presup-actions { display: none !important; }
  .lista-selector { display: none !important; }
  .presup-count .desc-info { display: none !important; }
  .custom-item-form { display: none !important; }
  #medioPago { display: none !important; }
  #medioPago + label, [for="medioPago"] { display: none !important; }
  #descPieRow { display: none !important; }
  body { background: white; }
  .main-wrap { display: block; height: auto; }
}
</style>
</head>
<body>
<div class="header">
  <img src="PARTES DE MOTOR (1).png" alt="Carril Motor">
  <div><h1>Carril Motor</h1><div class="subtitle">Buscador de Productos</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="tabProductos">Productos</button>
  <button class="tab-btn" data-tab="tabCarrito">Carrito <span class="tab-badge" id="cartBadge" style="display:none">0</span></button>
</div>

<div class="main-wrap">
  <div class="tab-content active" id="tabProductos">
    <div class="filters">
      <input type="text" id="search" placeholder="Buscar por codigo o descripcion..." autofocus>
      <div class="filter-row">
        <input type="text" id="filterRubro" list="rubroList" placeholder="Rubro (nombre o numero)..." style="flex:1;min-width:120px;">
        <datalist id="rubroList"></datalist>
        <select id="filterSubRubro"><option value="">Sub-rubros</option></select>
      </div>
      <div class="filter-row">
        <select id="filterStock">
          <option value="">Todo stock</option>
          <option value="pos">Con stock</option>
          <option value="zero">Sin stock</option>
        </select>
        <button id="clearFilters" class="btn-limpiar">Limpiar filtros</button>
      </div>
    </div>
    <div class="sort-area">
      <label>Ordenar:</label>
      <button class="sort-btn" data-field="stock">Stock</button>
      <button class="sort-btn" data-field="precio">Precio</button>
      <button class="sort-btn" data-field="cod">Codigo</button>
      <button class="sort-btn" data-field="desc">Descripcion</button>
      <span class="clear-sort" id="clearSort">Limpiar</span>
    </div>
    <div class="medidas-bar" id="medidasBar"></div>
    <div class="info-bar" id="infoBar">Cargando productos...</div>
    <div class="table-wrap" id="tableWrap">
      <div id="loading">Cargando productos, espere...</div>
      <table id="mainTable" style="display:none">
        <thead>
          <tr>
            <th>Codigo</th>
            <th>Descripcion</th>
            <th>Stk</th>
            <th style="text-align:right">Precio</th>
            <th>Cant.</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="tab-content" id="tabCarrito">
    <div class="presup-header">
      <h2>Presupuesto</h2>
      <input type="text" id="clientName" placeholder="Nombre del cliente...">
    </div>
    <div class="lista-selector">
      <button class="lista-btn active" data-lista="PLI">Lista PLI<span class="desc-pct">Sin dto</span></button>
      <button class="lista-btn" data-lista="TM">Lista TM<span class="desc-pct">3% dto</span></button>
      <button class="lista-btn" data-lista="TE">Lista TE<span class="desc-pct">7% dto</span></button>
    </div>
    <div style="padding:8px 12px;background:white;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:8px;">
      <label style="font-weight:600;font-size:.82rem;white-space:nowrap;">Medio de pago:</label>
      <select id="medioPago" style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-size:.85rem;">
        <option value="EFECTIVO">EFECTIVO</option>
        <option value="MERCADOPAGO">MERCADOPAGO</option>
        <option value="FACTURA EN CUENTA">FACTURA EN CUENTA</option>
        <option value="TARJETA DE DEBITO">TARJETA DE DEBITO</option>
        <option value="TARJETA DE CREDITO 1P">TARJETA DE CREDITO 1P</option>
        <option value="TC3P">TARJETA DE CREDITO 3P (+11%)</option>
        <option value="TC6P">TARJETA DE CREDITO 6P (+22%)</option>
      </select>
    </div>
    <div class="custom-item-form" style="padding:8px 10px;background:#fff3e0;border-bottom:1px solid #ddd;">
      <div style="font-weight:700;font-size:.8rem;margin-bottom:4px;color:#e65100;">+ Item personalizado (trabajos a medida)</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <input type="text" id="customDesc" placeholder="Descripcion..." style="flex:1;min-width:120px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:.82rem;">
        <input type="number" id="customPrecio" placeholder="Precio" style="width:80px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:.82rem;">
        <input type="number" id="customQty" placeholder="Cant" value="1" min="1" style="width:50px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:.82rem;">
        <button id="addCustomItem" style="padding:5px 10px;background:#e65100;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:.82rem;">Agregar</button>
      </div>
    </div>
    <div class="presup-items" id="presupItems"></div>
    <div class="presup-footer">
      <div class="presup-count" id="presupCount">0 items</div>
      <div id="presupSubtotal" style="font-size:.85rem;text-align:right;color:#666;"></div>
      <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;margin:4px 0;" id="descPieRow">
        <label style="font-size:.8rem;color:#666;">Dto. al pie:</label>
        <input type="number" id="descPie" value="0" min="0" max="100" style="width:55px;padding:4px 6px;border:1px solid #ccc;border-radius:4px;font-size:.85rem;text-align:center;">
        <span style="font-size:.8rem;color:#666;">%</span>
      </div>
      <div class="presup-total" id="presupTotal">$ 0</div>
      <div class="presup-actions">
        <button class="btn-print" onclick="printPresup()">Imprimir</button>
        <button class="btn-clear" onclick="clearPresup()">Limpiar</button>
      </div>
    </div>
  </div>
</div>

<script src="rubros.js"></script>
<script src="subrubros.js"></script>
<script src="data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  if (typeof PRODUCTOS === 'undefined' || !PRODUCTOS || !PRODUCTOS.length) {
    document.getElementById('loading').textContent = 'Error: No se pudieron cargar los productos. Abri con ABRIR.bat';
    return;
  }

  var PAGE_SIZE = 100;
  var DESCUENTOS = { PLI: 0, TM: 0.03, TE: 0.07 };
  var filtered = [];
  var sortCriteria = [];
  var currentPage = 0;
  var presupuesto = [];
  var listaActiva = 'PLI';
  var clientName = '';

  try { presupuesto = JSON.parse(localStorage.getItem('cm_presup') || '[]'); } catch(e) { presupuesto = []; }
  try { clientName = localStorage.getItem('cm_client') || ''; } catch(e) {}
  try { listaActiva = localStorage.getItem('cm_lista') || 'PLI'; } catch(e) {}

  document.getElementById('clientName').value = clientName;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('mainTable').style.display = '';

  var rubroSet = {};
  var subrubroSet = {};
  var rubros = [];
  var subrubros = [];
  for (var i = 0; i < PRODUCTOS.length; i++) {
    var p = PRODUCTOS[i];
    p._search = ((p.cod || '') + ' ' + (p.descL || '') + ' ' + (p.desc || '')).toLowerCase();
    if (!rubroSet[p.rubro]) { rubroSet[p.rubro] = true; rubros.push(p.rubro); }
    if (!subrubroSet[p.subrubro]) { subrubroSet[p.subrubro] = true; subrubros.push(p.subrubro); }
  }
  rubros.sort(function(a,b){return a-b;});
  subrubros.sort(function(a,b){return a-b;});

  var rubroList = document.getElementById('rubroList');
  var selS = document.getElementById('filterSubRubro');
  var rubroMap = {};
  for (var i = 0; i < rubros.length; i++) {
    var rName = (typeof RUBRO_NAMES !== 'undefined' && RUBRO_NAMES[rubros[i]]) ? RUBRO_NAMES[rubros[i]] : 'Rubro';
    var label = rName + ' (' + rubros[i] + ')';
    rubroMap[label] = rubros[i];
    rubroMap[String(rubros[i])] = rubros[i];
    var o = document.createElement('option'); o.value = label; rubroList.appendChild(o);
  }
  for (var i = 0; i < subrubros.length; i++) {
    var sName = (typeof SUBRUBRO_NAMES !== 'undefined' && SUBRUBRO_NAMES[subrubros[i]]) ? SUBRUBRO_NAMES[subrubros[i]] : 'Varios';
    var o = document.createElement('option'); o.value = subrubros[i]; o.textContent = sName + ' (' + subrubros[i] + ')'; selS.appendChild(o);
  }

  document.querySelectorAll('.lista-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lista === listaActiva);
    b.addEventListener('click', function() {
      listaActiva = b.dataset.lista;
      try { localStorage.setItem('cm_lista', listaActiva); } catch(e) {}
      document.querySelectorAll('.lista-btn').forEach(function(x) { x.classList.toggle('active', x === b); });
      renderPresupuesto();
    });
  });

  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s || ''));
    return d.innerHTML;
  }

  function updateBadge() {
    var badge = document.getElementById('cartBadge');
    if (presupuesto.length > 0) {
      badge.textContent = presupuesto.length;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  function applyFilters() {
    updateMedidasBar();

    var q = document.getElementById('search').value.toLowerCase().trim();
    var rubroInput = document.getElementById('filterRubro').value.trim();
    var rubro = '';
    if (rubroInput) {
      if (rubroMap[rubroInput] !== undefined) rubro = rubroMap[rubroInput];
      else if (!isNaN(rubroInput)) rubro = parseInt(rubroInput);
      else {
        var lc = rubroInput.toLowerCase();
        for (var k in rubroMap) { if (k.toLowerCase().indexOf(lc) !== -1) { rubro = rubroMap[k]; break; } }
      }
    }
    var subrubro = document.getElementById('filterSubRubro').value;
    var stockF = document.getElementById('filterStock').value;
    var terms = q ? q.split(/\s+/) : [];
    var medidas = getMedidaValues();

    filtered = [];
    for (var i = 0; i < PRODUCTOS.length; i++) {
      var p = PRODUCTOS[i];
      var ok = true;
      if (terms.length) {
        for (var t = 0; t < terms.length; t++) {
          if (p._search.indexOf(terms[t]) === -1) { ok = false; break; }
        }
      }
      if (!ok) continue;
      if (rubro && p.rubro != rubro) continue;
      if (subrubro && p.subrubro != subrubro) continue;
      if (stockF === 'pos' && p.stock <= 0) continue;
      if (stockF === 'zero' && p.stock > 0) continue;
      if (medidas && !matchMedidas(p.descL || p.desc, medidas)) continue;
      filtered.push(p);
    }

    if (sortCriteria.length) {
      filtered.sort(function(a, b) {
        for (var s = 0; s < sortCriteria.length; s++) {
          var field = sortCriteria[s].field;
          var dir = sortCriteria[s].dir;
          var va = a[field], vb = b[field];
          if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
          if (va < vb) return dir === 'asc' ? -1 : 1;
          if (va > vb) return dir === 'asc' ? 1 : -1;
        }
        return 0;
      });
    }

    currentPage = 0;
    renderTable();
  }

  function renderTable() {
    var start = currentPage * PAGE_SIZE;
    var page = filtered.slice(start, start + PAGE_SIZE);
    var tbody = document.getElementById('tbody');

    document.getElementById('infoBar').textContent = filtered.length.toLocaleString() + ' productos encontrados';

    var html = '';
    for (var i = 0; i < page.length; i++) {
      var p = page[i];
      var codEsc = esc(p.cod);
      html += '<tr class="' + (p.stock <= 0 ? 'out-of-stock' : '') + '">' +
        '<td><strong>' + codEsc + '</strong></td>' +
        '<td title="' + esc(p.descL) + '">' + esc(p.descL || p.desc) + '</td>' +
        '<td class="' + (p.stock > 0 ? 'stock-pos' : 'stock-0') + '">' + p.stock + '</td>' +
        '<td style="text-align:right">$' + p.precio.toLocaleString('es-AR') + '</td>' +
        '<td><input class="qty-input" type="number" min="1" value="1" data-cod="' + codEsc + '"></td>' +
        '<td><button class="add-btn" data-addcod="' + codEsc + '">+ Agregar</button></td>' +
        '<td><button class="img-btn" data-imgq="' + codEsc + ' ' + esc(p.desc) + '">IMG</button></td>' +
        '</tr>';
    }
    tbody.innerHTML = html;
    renderPagination();
  }

  document.getElementById('tbody').addEventListener('click', function(e) {
    var btn = e.target.closest('.add-btn');
    if (!btn) return;
    var cod = btn.dataset.addcod;
    var row = btn.closest('tr');
    var qtyInput = row.querySelector('.qty-input');
    var qty = parseInt(qtyInput.value) || 1;
    var prod = null;
    for (var i = 0; i < PRODUCTOS.length; i++) {
      if (PRODUCTOS[i].cod === cod) { prod = PRODUCTOS[i]; break; }
    }
    if (!prod) return;

    var existing = null;
    for (var i = 0; i < presupuesto.length; i++) {
      if (presupuesto[i].cod === cod) { existing = presupuesto[i]; break; }
    }
    if (existing) { existing.qty += qty; }
    else { presupuesto.push({ cod: prod.cod, desc: prod.descL || prod.desc, precio: prod.precio, qty: qty }); }

    savePresup();
    renderPresupuesto();
    qtyInput.value = 1;
    btn.textContent = '✓ Agregado';
    setTimeout(function() { btn.textContent = '+ Agregar'; }, 800);
  });

  function renderPagination() {
    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    var pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    var html = '<button ' + (currentPage === 0 ? 'disabled' : '') + ' onclick="window._goPage(' + (currentPage-1) + ')">◀</button>';
    var pStart = Math.max(0, currentPage - 3);
    var pEnd = Math.min(totalPages, currentPage + 4);
    if (pStart > 0) html += '<button onclick="window._goPage(0)">1</button><span>...</span>';
    for (var i = pStart; i < pEnd; i++) {
      html += '<button class="' + (i===currentPage?'active-page':'') + '" onclick="window._goPage(' + i + ')">' + (i+1) + '</button>';
    }
    if (pEnd < totalPages) html += '<span>...</span><button onclick="window._goPage(' + (totalPages-1) + ')">' + totalPages + '</button>';
    html += '<button ' + (currentPage===totalPages-1?'disabled':'') + ' onclick="window._goPage(' + (currentPage+1) + ')">▶</button>';
    pag.innerHTML = html;
  }

  window._goPage = function(p) { currentPage = p; renderTable(); document.getElementById('tableWrap').scrollTop = 0; };

  var RECARGOS_PAGO = { 'TC3P': 0.11, 'TC6P': 0.22 };

  function getMedioPago() {
    var el = document.getElementById('medioPago');
    return el ? el.value : 'EFECTIVO';
  }

  function renderPresupuesto() {
    var cont = document.getElementById('presupItems');
    var desc = DESCUENTOS[listaActiva];
    var medioPago = getMedioPago();
    var recargo = RECARGOS_PAGO[medioPago] || 0;
    var html = '';
    var total = 0;

    for (var i = 0; i < presupuesto.length; i++) {
      var item = presupuesto[i];
      var precioFinal = item.custom ? item.precio : Math.round(item.precio * (1 - desc));
      var precioConRecargo = Math.round(precioFinal * (1 + recargo));
      var subtotal = precioConRecargo * item.qty;
      total += subtotal;
      html += '<div class="presup-item">' +
        '<div class="pi-top">' +
          '<span class="pi-cod">' + esc(item.cod) + '</span>' +
          '<span class="pi-remove" data-remcod="' + esc(item.cod) + '">&times;</span>' +
        '</div>' +
        '<div class="pi-desc" title="' + esc(item.desc) + '">' + esc(item.desc) + '</div>' +
        '<div class="pi-bottom">' +
          '<span class="pi-qty-price">' + item.qty + ' x $<input type="number" class="pi-edit-price" data-cod="' + esc(item.cod) + '" value="' + precioConRecargo + '" style="width:70px;border:1px solid #ccc;border-radius:3px;padding:2px 4px;font-size:.8rem;text-align:right;"></span>' +
          '<span class="pi-subtotal">$' + subtotal.toLocaleString('es-AR') + '</span>' +
        '</div>' +
        '</div>';
    }
    cont.innerHTML = html;

    cont.className = 'presup-items lista-' + listaActiva;

    var descPie = parseFloat(document.getElementById('descPie').value) || 0;
    var subtotalLabel = '';
    var totalFinal = total;
    if (descPie > 0 && descPie <= 100) {
      subtotalLabel = 'Subtotal: $' + total.toLocaleString('es-AR') + ' — Dto: ' + descPie + '%';
      totalFinal = Math.round(total * (1 - descPie / 100));
    }
    document.getElementById('presupSubtotal').textContent = subtotalLabel;

    var totalLabel = '$ ' + totalFinal.toLocaleString('es-AR');
    if (recargo > 0) totalLabel += ' (rec. ' + (recargo*100) + '%)';
    document.getElementById('presupTotal').textContent = totalLabel;
    document.getElementById('presupCount').innerHTML = presupuesto.length + ' items' + '<span class="desc-info"> — Lista ' + listaActiva + (desc > 0 ? ' (' + (desc*100) + '% desc.)' : '') + ' — ' + medioPago + '</span>';
    updateBadge();
  }

  document.getElementById('presupItems').addEventListener('click', function(e) {
    var rem = e.target.closest('[data-remcod]');
    if (!rem) return;
    var cod = rem.dataset.remcod;
    presupuesto = presupuesto.filter(function(i) { return i.cod !== cod; });
    savePresup();
    renderPresupuesto();
  });

  document.getElementById('presupItems').addEventListener('change', function(e) {
    var input = e.target.closest('.pi-edit-price');
    if (!input) return;
    var cod = input.dataset.cod;
    var newPrice = parseFloat(input.value);
    if (isNaN(newPrice)) return;
    for (var i = 0; i < presupuesto.length; i++) {
      if (presupuesto[i].cod === cod) {
        presupuesto[i].precio = newPrice;
        presupuesto[i].custom = true;
        break;
      }
    }
    savePresup();
    renderPresupuesto();
  });

  function savePresup() { try { localStorage.setItem('cm_presup', JSON.stringify(presupuesto)); } catch(e) {} }

  window.clearPresup = function() {
    if (!confirm('Limpiar el presupuesto?')) return;
    presupuesto = [];
    document.getElementById('clientName').value = '';
    clientName = '';
    try { localStorage.setItem('cm_client', ''); } catch(e) {}
    savePresup();
    renderPresupuesto();
  };

  document.getElementById('descPie').addEventListener('input', renderPresupuesto);

  window.printPresup = function() {
    var now = new Date();
    var dd = String(now.getDate()).padStart(2,'0');
    var mm = String(now.getMonth()+1).padStart(2,'0');
    var aa = String(now.getFullYear()).slice(-2);
    var fecha = dd + mm + aa;
    var nombre = document.getElementById('clientName').value.trim() || 'SinNombre';
    var oldTitle = document.title;
    document.title = fecha + ' ' + nombre;
    window.print();
    document.title = oldTitle;
  };

  document.getElementById('clientName').addEventListener('input', function(e) {
    clientName = e.target.value;
    try { localStorage.setItem('cm_client', clientName); } catch(e2) {}
  });

  document.querySelectorAll('.sort-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var field = btn.dataset.field;
      var existing = -1;
      for (var i = 0; i < sortCriteria.length; i++) {
        if (sortCriteria[i].field === field) { existing = i; break; }
      }
      if (existing >= 0) {
        if (sortCriteria[existing].dir === 'asc') sortCriteria[existing].dir = 'desc';
        else sortCriteria.splice(existing, 1);
      } else {
        sortCriteria.push({ field: field, dir: 'asc' });
      }
      updateSortButtons();
      applyFilters();
    });
  });

  document.getElementById('clearSort').addEventListener('click', function() {
    sortCriteria = [];
    updateSortButtons();
    applyFilters();
  });

  function updateSortButtons() {
    document.querySelectorAll('.sort-btn').forEach(function(btn) {
      var s = null;
      for (var i = 0; i < sortCriteria.length; i++) {
        if (sortCriteria[i].field === btn.dataset.field) { s = sortCriteria[i]; break; }
      }
      btn.classList.toggle('active', !!s);
      btn.classList.toggle('asc', s && s.dir === 'asc');
      btn.classList.toggle('desc', s && s.dir === 'desc');
    });
  }

  var searchTimer;
  document.getElementById('search').addEventListener('input', function() { clearTimeout(searchTimer); searchTimer = setTimeout(applyFilters, 250); });
  var rubroTimer;
  document.getElementById('filterRubro').addEventListener('input', function() { clearTimeout(rubroTimer); rubroTimer = setTimeout(applyFilters, 300); });
  document.getElementById('filterSubRubro').addEventListener('change', applyFilters);
  document.getElementById('filterStock').addEventListener('change', applyFilters);

  // Google Images button
  document.getElementById('tbody').addEventListener('click', function(e) {
    var imgBtn = e.target.closest('.img-btn');
    if (!imgBtn) return;
    var q = imgBtn.dataset.imgq;
    window.open('https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(q), '_blank');
  });

  // Adaptive measurement filters
  var MEDIDA_CONFIG = {
    452: { title: 'Medidas Subconjunto', fields: [{ id: 'diam', label: 'Diametro (mm)', placeholder: 'ej: 75' }] },
    26: { title: 'Medidas Aros Cromados', fields: [
      { id: 'diam', label: 'Diametro (mm)', placeholder: 'ej: 75' },
      { id: 'r1', label: 'Aro 1', placeholder: 'ej: 1.2' },
      { id: 'r2', label: 'Aro 2', placeholder: 'ej: 1.5' },
      { id: 'r3', label: 'Aro 3', placeholder: 'ej: 2.8' },
      { id: 'r4', label: 'Aro 4', placeholder: '' },
      { id: 'r5', label: 'Aro 5', placeholder: '' }
    ]},
    32: { title: 'Medidas Aros Semi Hidraulicos', fields: [
      { id: 'diam', label: 'Diametro (mm)', placeholder: 'ej: 75' },
      { id: 'r1', label: 'Aro 1', placeholder: 'ej: 1.2' },
      { id: 'r2', label: 'Aro 2', placeholder: 'ej: 1.5' },
      { id: 'r3', label: 'Aro 3', placeholder: 'ej: 2' },
      { id: 'r4', label: 'Aro 4', placeholder: '' },
      { id: 'r5', label: 'Aro 5', placeholder: '' }
    ]},
    29: { title: 'Medidas Aros Hidraulicos', fields: [
      { id: 'diam', label: 'Diametro (mm)', placeholder: 'ej: 75' },
      { id: 'r1', label: 'Aro 1', placeholder: 'ej: 1.5' },
      { id: 'r2', label: 'Aro 2', placeholder: 'ej: 2' },
      { id: 'r3', label: 'Aro 3', placeholder: 'ej: 3' },
      { id: 'r4', label: 'Aro 4', placeholder: '' },
      { id: 'r5', label: 'Aro 5', placeholder: '' }
    ]},
    559: { title: 'Medidas Valvulas', fields: [
      { id: 'cabeza', label: 'Cabeza (mm)', placeholder: 'ej: 28' },
      { id: 'vastago', label: 'Vastago (mm)', placeholder: 'ej: 7' },
      { id: 'largo', label: 'Largo (mm)', placeholder: 'ej: 104' }
    ]},
    1008: { title: 'Medidas Guia Valvula', fields: [
      { id: 'interior', label: 'Interior (mm)', placeholder: 'ej: 5.5' },
      { id: 'exterior', label: 'Exterior (mm)', placeholder: 'ej: 11' },
      { id: 'largo', label: 'Largo (mm)', placeholder: 'ej: 41' }
    ]},
    421: { title: 'Medidas Reten Distrib.', fields: [
      { id: 'interior', label: 'Interior (mm)', placeholder: 'ej: 35' },
      { id: 'exterior', label: 'Exterior (mm)', placeholder: 'ej: 50' },
      { id: 'alto', label: 'Alto (mm)', placeholder: 'ej: 7' }
    ]},
    417: { title: 'Medidas Reten Bancada', fields: [
      { id: 'interior', label: 'Interior (mm)', placeholder: 'ej: 80' },
      { id: 'exterior', label: 'Exterior (mm)', placeholder: 'ej: 98' },
      { id: 'alto', label: 'Alto (mm)', placeholder: 'ej: 10' }
    ]},
    1001: { title: 'Medidas Asiento Valvula', fields: [
      { id: 'interior', label: 'Interior (mm)', placeholder: 'ej: 30' },
      { id: 'exterior', label: 'Exterior (mm)', placeholder: 'ej: 38' },
      { id: 'alto', label: 'Alto (mm)', placeholder: 'ej: 7' }
    ]}
  };

  var currentMedidaRubro = null;

  function getActiveRubro() {
    var rubroInput = document.getElementById('filterRubro').value.trim();
    if (!rubroInput) return null;
    if (rubroMap[rubroInput] !== undefined) return rubroMap[rubroInput];
    if (!isNaN(rubroInput)) return parseInt(rubroInput);
    var lc = rubroInput.toLowerCase();
    for (var k in rubroMap) { if (k.toLowerCase().indexOf(lc) !== -1) return rubroMap[k]; }
    return null;
  }

  function updateMedidasBar() {
    var rubro = getActiveRubro();
    var bar = document.getElementById('medidasBar');
    var config = rubro !== null ? MEDIDA_CONFIG[rubro] : null;

    if (!config) {
      bar.classList.remove('visible');
      bar.innerHTML = '';
      currentMedidaRubro = null;
      return;
    }

    if (currentMedidaRubro === rubro) return;
    currentMedidaRubro = rubro;

    var html = '<div class="medida-title">' + config.title + ' <span style="font-weight:400;font-size:.75rem;color:#666;">Tolerancia:</span> <input type="text" id="med_tolerancia" value="0.5" style="width:45px;font-size:.8rem;text-align:center;border:1px solid #90caf9;border-radius:4px;padding:2px 4px;"> mm</div>';
    for (var i = 0; i < config.fields.length; i++) {
      var f = config.fields[i];
      html += '<div class="medida-group"><span>' + f.label + ':</span><input type="text" id="med_' + f.id + '" placeholder="' + f.placeholder + '"></div>';
    }
    bar.innerHTML = html;
    bar.classList.add('visible');

    bar.querySelectorAll('input').forEach(function(inp) {
      inp.addEventListener('input', function() { clearTimeout(searchTimer); searchTimer = setTimeout(applyFilters, 350); });
    });
  }

  function getMedidaValues() {
    var rubro = getActiveRubro();
    var config = rubro !== null ? MEDIDA_CONFIG[rubro] : null;
    if (!config) return null;
    var vals = {};
    var hasAny = false;
    for (var i = 0; i < config.fields.length; i++) {
      var el = document.getElementById('med_' + config.fields[i].id);
      var v = el ? el.value.trim() : '';
      vals[config.fields[i].id] = v;
      if (v) hasAny = true;
    }
    return hasAny ? { rubro: rubro, vals: vals } : null;
  }

  function getTolerance() {
    var el = document.getElementById('med_tolerancia');
    var t = el ? parseFloat(el.value) : 0.5;
    return isNaN(t) ? 0.5 : t;
  }

  function numClose(textVal, searchVal, tol) {
    var a = parseFloat(textVal);
    var b = parseFloat(searchVal);
    if (isNaN(a) || isNaN(b)) return false;
    return Math.abs(a - b) <= tol;
  }

  function findDiameter(text) {
    var matches = text.match(/(\d+\.?\d*)\s*MM/g);
    if (!matches) return [];
    return matches.map(function(m) { return parseFloat(m); });
  }

  function matchMedidas(descText, medidas) {
    var r = medidas.rubro;
    var v = medidas.vals;
    var tol = getTolerance();
    var text = descText.toUpperCase().replace(/,/g, '.');

    if (r === 452) {
      if (v.diam) {
        var diams = findDiameter(text);
        if (!diams.length) return false;
        var found = false;
        for (var d = 0; d < diams.length; d++) { if (numClose(diams[d], v.diam, tol)) { found = true; break; } }
        if (!found) return false;
      }
    } else if (r === 26 || r === 32 || r === 29) {
      if (v.diam) {
        var diams2 = findDiameter(text);
        if (!diams2.length) return false;
        var found2 = false;
        for (var d2 = 0; d2 < diams2.length; d2++) { if (numClose(diams2[d2], v.diam, tol)) { found2 = true; break; } }
        if (!found2) return false;
      }
      var espMatch = text.match(/(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)(?:\s*[xX]\s*(\d+\.?\d*))?(?:\s*[xX]\s*(\d+\.?\d*))?(?:\s*[xX]\s*(\d+\.?\d*))?/);
      if (espMatch) {
        var espesores = [espMatch[1], espMatch[2], espMatch[3], espMatch[4], espMatch[5]].filter(Boolean);
        var fields = ['r1','r2','r3','r4','r5'];
        for (var i = 0; i < fields.length; i++) {
          if (v[fields[i]]) {
            if (!espesores[i]) return false;
            if (!numClose(espesores[i], v[fields[i]], tol)) return false;
          }
        }
      } else if (v.r1) return false;
    } else if (r === 559) {
      var vMatch = text.match(/(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)/);
      if (vMatch) {
        if (v.cabeza && !numClose(vMatch[1], v.cabeza, tol)) return false;
        if (v.vastago && !numClose(vMatch[2], v.vastago, tol)) return false;
        if (v.largo && !numClose(vMatch[3], v.largo, tol)) return false;
      } else if (v.cabeza || v.vastago || v.largo) return false;
    } else if (r === 1008) {
      var gMatch = text.match(/(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)/);
      if (gMatch) {
        if (v.interior && !numClose(gMatch[1], v.interior, tol)) return false;
        if (v.exterior && !numClose(gMatch[2], v.exterior, tol)) return false;
        if (v.largo && !numClose(gMatch[3], v.largo, tol)) return false;
      } else if (v.interior || v.exterior || v.largo) return false;
    } else if (r === 421 || r === 417 || r === 1001) {
      var rMatch = text.match(/(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)\s*[xX]\s*(\d+\.?\d*)/);
      if (rMatch) {
        if (v.interior && !numClose(rMatch[1], v.interior, tol)) return false;
        if (v.exterior && !numClose(rMatch[2], v.exterior, tol)) return false;
        if (v.alto && !numClose(rMatch[3], v.alto, tol)) return false;
      } else if (v.interior || v.exterior || v.alto) return false;
    }
    return true;
  }

  document.getElementById('clearFilters').addEventListener('click', function() {
    document.getElementById('search').value = '';
    document.getElementById('filterRubro').value = '';
    document.getElementById('filterSubRubro').value = '';
    document.getElementById('filterStock').value = '';
    sortCriteria = [];
    updateSortButtons();
    applyFilters();
  });

  document.getElementById('medioPago').addEventListener('change', renderPresupuesto);

  document.getElementById('addCustomItem').addEventListener('click', function() {
    var desc = document.getElementById('customDesc').value.trim();
    var precio = parseFloat(document.getElementById('customPrecio').value);
    var qty = parseInt(document.getElementById('customQty').value) || 1;
    if (!desc || isNaN(precio)) { alert('Completa descripcion y precio'); return; }
    var cod = 'AA-' + Date.now().toString(36).toUpperCase();
    presupuesto.push({ cod: cod, desc: desc, precio: precio, qty: qty, custom: true });
    savePresup();
    renderPresupuesto();
    document.getElementById('customDesc').value = '';
    document.getElementById('customPrecio').value = '';
    document.getElementById('customQty').value = '1';
  });

  applyFilters();
  renderPresupuesto();
});
</script>
</body>
</html>
